# OnePlus 6T mobile data helper configuration.
#
# Public images keep auto-connect enabled for boot-time bring-up by default.
# If your SIM/carrier needs a custom APN, set it with `oneplus6t-mobile-data
# configure --apn ...`.

AUTO_CONNECT=yes
APN=
APN_USER=
APN_PASSWORD=
IP_TYPE=ipv4
ROUTE_METRIC=700
CONNECT_TIMEOUT=60
ALLOW_EMPTY_APN=no
