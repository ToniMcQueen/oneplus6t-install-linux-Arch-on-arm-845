# OnePlus 6T Qualcomm radio remoteprocs are deliberately kept out of udev
# coldplug during sysinit. Sensors use SDSP/SLPI through qcom_q6v5_pas and
# FastRPC; modem and Wi-Fi are loaded later by oneplus6t-qcom-radio.service
# when ENABLE_QCOM_RADIO=1 is used for test builds.
blacklist qcom_q6v5_mss
blacklist ath10k_snoc
