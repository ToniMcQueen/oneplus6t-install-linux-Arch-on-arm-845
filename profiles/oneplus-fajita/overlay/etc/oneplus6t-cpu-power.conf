# OnePlus 6T CPU power defaults.
#
# This is intentionally a small shell-style config file instead of a hardcoded
# policy. The image applies a sane default on boot, and builders/users can
# replace it with cpupower, power-profiles-daemon, or their own service later.

# First available governor wins. On modern mobile kernels schedutil is usually
# the right default; ondemand is kept next for kernels that expose it.
GOVERNOR_PREFERENCE="schedutil ondemand powersave performance"

# Frequency values are in kHz. Use hardware-min/hardware-max to follow the
# current kernel and avoid baking OnePlus 6T frequency tables into the image.
# Use "keep" to leave that side unchanged.
MIN_FREQ_KHZ="hardware-min"
MAX_FREQ_KHZ="hardware-max"

# Some kernels expose energy_performance_preference. Qualcomm kernels often do
# not, but keeping this here makes the config useful across kernel experiments.
SET_ENERGY_PERFORMANCE_PREFERENCE=1
ENERGY_PERFORMANCE_PREFERENCE="balance_power"
