# OnePlus 6T hardware controls for Hyprland.

input {
    touchdevice {
        output = DSI-1
        transform = 0
        enabled = true
    }
}

gestures {
    workspace_swipe_distance = 260
    workspace_swipe_touch = true
    workspace_swipe_touch_invert = false
    workspace_swipe_create_new = false
}

cursor {
    hide_on_touch = true
}

# Mark the desktop handoff before later helpers touch modem/audio/Wi-Fi paths.
exec-once = sh -lc 'touch "${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/oneplus6t-desktop-ready"'

# Keep the desktop responsive first, then touch the fragile call/audio path.
exec-once = sh -lc 'sleep 120; exec /usr/local/bin/oneplus6t-audio-profile'

# PMOS-style phone/SMS background handlers. Hyprland is launched directly from
# getty, so start the GApplication services explicitly instead of relying on
# desktop-environment XDG autostart handling.
exec-once = sh -lc 'sleep 120; command -v callaudiod >/dev/null 2>&1 && exec callaudiod; exit 0'
exec-once = sh -lc 'sleep 120; exec /usr/local/bin/oneplus6t-call-audio-watch'
exec-once = sh -lc 'sleep 90; exec gnome-calls --gapplication-service'
exec-once = sh -lc 'sleep 90; exec chatty --gapplication-service'

# SensorProxy drives HyperRotation so the phone follows physical orientation.
exec-once = /usr/local/bin/oneplus6t-auto-rotate

bind = SUPER, Return, exec, /usr/local/bin/oneplus6t-terminal
bind = SUPER, Q, exec, /usr/local/bin/oneplus6t-terminal
bind = SUPER, K, exec, /usr/local/bin/oneplus6t-osk toggle
bind = SUPER, H, exec, sh -lc 'pkill -x wvkbd-deskintl || pkill -x wvkbd-mobintl || pkill -x wvkbd || true'
bind = SUPER, C, killactive
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# No default app launcher is forced by this profile. Users who want one can add
# their preferred launcher package and bind SUPER+S to nwg-menu, fuzzel, wofi,
# rofi, or their own script.

bindl = , XF86PowerOff, exec, hyprctl notify -1 1600 "rgb(55ff99)" "Power key caught"
bindl = , code:124, exec, hyprctl notify -1 1600 "rgb(55ff99)" "Power key caught"

bindel = , XF86AudioRaiseVolume, exec, /usr/local/bin/oneplus6t-volume up
bindel = , XF86AudioLowerVolume, exec, /usr/local/bin/oneplus6t-volume down
bindel = , XF86AudioMute, exec, /usr/local/bin/oneplus6t-volume mute
bindel = , code:123, exec, /usr/local/bin/oneplus6t-volume up
bindel = , code:122, exec, /usr/local/bin/oneplus6t-volume down
